name: CI
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: ./backend
      - name: Run tests
        run: uv run pytest tests/unit/ --alluredir=allure-results
        working-directory: ./backend
      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report
        working-directory: ./backend
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-allure-report
          path: backend/allure-report

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Python
        run: uv python install
      - name: Install Python dependencies
        run: uv sync --extra dev
        working-directory: ./backend
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::494281305257:role/parlez-github-actions
          aws-region: us-east-1
      - name: Get secrets from AWS
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            DEEPL_API_KEY,parlez/deepl-api-key
          parse-json-secrets: false
      - name: Start backend
        env:
          API_KEY: ci-test-key
        run: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: ./backend
      - name: Wait for backend
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8000/health && break
            sleep 2
          done
      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
        working-directory: ./backend
      - name: Run integration tests
        run: uv run pytest tests/integration/ --alluredir=allure-results --api-token ci-test-key
        working-directory: ./backend
      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report
        working-directory: ./backend
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-allure-report
          path: backend/allure-report

  publish-reports:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download unit test report
        uses: actions/download-artifact@v4
        with:
          name: unit-test-allure-report
          path: reports/unit
      - name: Download integration test report
        uses: actions/download-artifact@v4
        with:
          name: integration-test-allure-report
          path: reports/integration
      - name: Create index page
        run: |
          cat > reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Parlez Test Reports</title></head>
          <body>
            <h1>Parlez Test Reports</h1>
            <ul>
              <li><a href="unit/index.html">Unit Tests</a></li>
              <li><a href="integration/index.html">Integration Tests</a></li>
            </ul>
          </body>
          </html>
          EOF
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Write summary
        run: |
          echo "## Test Reports" >> $GITHUB_STEP_SUMMARY
          echo "- [Unit Tests](https://nothingman89.github.io/parlez/unit/index.html)" >> $GITHUB_STEP_SUMMARY
          echo "- [Integration Tests](https://nothingman89.github.io/parlez/integration/index.html)" >> $GITHUB_STEP_SUMMARY
