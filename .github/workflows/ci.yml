name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --extra dev
        working-directory: ./backend
      - name: Run tests
        run: uv run pytest --junitxml=test-results.xml
        working-directory: ./backend
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: backend/test-results.xml
          reporter: java-junit

  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install Python
        run: uv python install
      - name: Install Python dependencies
        run: uv sync --extra dev
        working-directory: ./backend
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start backend
        run: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: ./backend
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      - name: Debug backend
        run: sleep 3 && curl -v http://localhost:8000/health
      - name: Wait for backend
        run: |
          for i in {1..10}; do
            curl -s http://localhost:8000/health && break
            sleep 2
          done
      - name: Install Playwright
        run: npm ci
        working-directory: ./backend/tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: ./backend/tests
      - name: Run integration tests
        run: npx playwright test integration/
        working-directory: ./backend/tests
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: backend/tests/test-results/integration.xml
          reporter: java-junit
