name: E2E environment up
on:
  workflow_dispatch:

concurrency:
  group: pulumi-e2e

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::494281305257:role/parlez-github-actions
          aws-region: us-east-1

      - name: Get Pulumi token from AWS
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            PULUMI_ACCESS_TOKEN,parlez/pulumi-access-token
          parse-json-secrets: false

      - uses: astral-sh/setup-uv@v4

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ev_pulumi/dev
          work-dir: infrastructure/e2e

      - name: Build and push image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker build -t ghcr.io/${{ github.repository_owner }}/parlez-backend:${{ github.sha }} backend/
          docker push ghcr.io/${{ github.repository_owner }}/parlez-backend:${{ github.sha }}

      - name: Deploy to instance
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/parlez-e2e.pem
          chmod 600 ~/.ssh/parlez-e2e.pem
          PUBLIC_IP=$(pulumi stack output public_ip --cwd infrastructure/e2e)
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/parlez-e2e.pem ec2-user@$PUBLIC_IP "
            echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin &&
            sudo docker pull ghcr.io/${{ github.repository_owner }}/parlez-backend:${{ github.sha }} &&
            sudo docker rm -f parlez-api || true &&
            sudo docker run -d --name parlez-api --restart unless-stopped --network host ghcr.io/${{ github.repository_owner }}/parlez-backend:${{ github.sha }}
          "

      - name: Write summary
        run: |
          echo "## E2E instance up" >> $GITHUB_STEP_SUMMARY
          echo "- Instance ID: $(pulumi stack output instance_id --cwd infrastructure/e2e)" >> $GITHUB_STEP_SUMMARY
          echo "- Public IP: $(pulumi stack output public_ip --cwd infrastructure/e2e)" >> $GITHUB_STEP_SUMMARY